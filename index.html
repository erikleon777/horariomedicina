        }

        }

            padding: 0 4px;
        }

            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 11px;
            display: inline-block;
            max-width: calc(100% - 25px);
            vertical-align: middle;
        }

            background: #f8fafc;

            font-size: 1.1em;
            font-weight: 500;
            color: #0f172a;
            border-bottom: 1px solid #e2e8f0;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            line-height: 1.2;
            height: auto;
            min-height: 15px;
        }
        .materias-ano, .grupos-subgrupos {
            margin-top: 1px;
            padding: 0px;
        }
        .materia {
            padding: 4px 6px;
            margin: 4px 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            background-color: #ffffff;
            transition: background-color 0.2s, border-color 0.2s;
            font-size: 11px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            word-break: break-word;
        }
        .materia:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }
        .materia input[type="checkbox"] {
            margin-right: 2px;
            accent-color: #2563eb;
            transform: scale(1);
            flex-shrink: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 11px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }

            border: 1px solid #e2e8f0;
            padding: 8px 4px;
            text-align: center;
            vertical-align: top;
        }
        th {
            background: #f8fafc;
            font-weight: 500;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            font-size: 10px;
        }
        td {
            background-color: #ffffff;
        }
        button {
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s;

            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);

        }

            transform: scale(1.02);

            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

            background: #f1f5f9;
            border-color: #94a3b8;
        }

            transform: scale(0.96);
        }

            font-weight: 400;
            color: #64748b;
            margin-top: 25px;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.02em;

            display: inline-block;

                font-size: 11px;
            }

            position: relative;
            overflow: hidden;

            box-shadow: 0 8px 25px rgba(0,0,0,0.15);

            border: 3px solid #3b82f6 !important;
            background-color: #f0f9ff !important;

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0) 100%);

            position: absolute;
            top: -8px;
            right: -8px;
            width: 32px;
            height: 32px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;

            border: 2px solid white;
            z-index: 10;
            animation: popIn 0.3s ease;

            0% { transform: scale(0); }
            50% { transform: scale(1.2); }

            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;

        }

            font-size: 11px;
            color: #475569;

            align-items: center;

        }

            display: inline-block;
            width: 24px;
            height: 24px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-weight: bold;
            margin: 0 5px;
        }

</head>

    // ==================== FUNCIÓN PARA MOSTRAR NOMBRE DEL SUBGRUPO ====================
    // Esta función decide si mostrar solo el grupo (para 1 subgrupo) o grupo+número (para múltiples)
    function obtenerNombreSubgrupo(grupo, numSubgrupo, totalSubgrupos) {
        if (totalSubgrupos === 1) {
            // Si solo hay 1 subgrupo, mostrar solo el nombre del grupo (ej: "A", "AM", "VIRTUAL")
            return grupo;
        } else {
            // Si hay múltiples subgrupos, mostrar grupo + número (ej: "A1", "B2")
            return `${grupo}${numSubgrupo}`;
        }
    }

    // ==================== GENERACIÓN DE COLORES ÚNICOS ====================
    const coloresUnicos = new Map();
    let totalSubgrupos = 0;
    const listaSubgrupos = [];

    for (const [codigo, materia] of Object.entries(materias)) {
        for (const [grupo, numSubgrupos] of Object.entries(materia.grupos)) {
            for (let j = 1; j <= numSubgrupos; j++) {
                const subgrupo = `${grupo}${j}`;
                listaSubgrupos.push({ codigo, subgrupo });
                totalSubgrupos++;
            }
        }
    }

    function generarColorUnico(indice, total) {
        const goldenRatio = (1 + Math.sqrt(5)) / 2;
        const hue = (indice * 360 / goldenRatio) % 360;
        const saturation = 40 + (indice % 30);
        const lightness = 60 + (indice % 25);
        return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    for (let i = 0; i < totalSubgrupos; i++) {
        const color = generarColorUnico(i, totalSubgrupos);
        const item = listaSubgrupos[i];
        const key = `${item.codigo}-${item.subgrupo}`;
        coloresUnicos.set(key, color);
    }

    const coloresGrupos = {};
    for (const [codigo, materia] of Object.entries(materias)) {
        coloresGrupos[codigo] = {};
        for (const [grupo, numSubgrupos] of Object.entries(materia.grupos)) {
            for (let j = 1; j <= numSubgrupos; j++) {
                const subgrupo = `${grupo}${j}`;
                coloresGrupos[codigo][subgrupo] = coloresUnicos.get(`${codigo}-${subgrupo}`);
            }
        }
    }

    window.mostrarSubgrupos = function(columnaMateria, codigo, grupo, subgruposTotales) {
        const contenedorSub = columnaMateria.querySelector(`#subgrupos-${codigo}-${grupo}`);
        if (!contenedorSub) return;

        if (contenedorSub.style.display === 'none' || contenedorSub.innerHTML === '') {
            contenedorSub.innerHTML = "";
            for (let j = 1; j <= subgruposTotales; j++) {
                const nombreVisual = obtenerNombreSubgrupo(grupo, j, subgruposTotales);
                const subgrupoKey = `${grupo}${j}`;
                const label = document.createElement("label");
                const cb = document.createElement("input");
                cb.type = "checkbox";
                cb.value = subgrupoKey;
                cb.id = `subgrupo-${codigo}-${grupo}-${j}`;
                label.appendChild(cb);
                label.appendChild(document.createTextNode(" " + nombreVisual));
                contenedorSub.appendChild(label);
            }
        }
        contenedorSub.style.display = "block";
    };

    function tienenCruce(horarios1, horarios2) {
        if (!horarios1 || !horarios2) return false;
        for (const dia in horarios1) {
            if (horarios2[dia] && Array.isArray(horarios1[dia]) && Array.isArray(horarios2[dia])) {
                for (const hora of horarios1[dia]) {
                    if (horarios2[dia].includes(hora)) return true;
                }
            }
        }
        return false;
    }

    let estadoConstructor = {
        materias: [],

        prioridades: {},
        modo: 'activo'
    };

    function calcularOpcionesPosibles(codigo) {
        const materia = materias[codigo];
        if (!materia) return [];
        
        const opciones = [];
        for (const [grupo, numSubgrupos] of Object.entries(materia.grupos)) {
            for (let j = 1; j <= numSubgrupos; j++) {
                const subgrupoKey = `${grupo}${j}`;
                let compatible = true;
                for (const [cod, sel] of Object.entries(estadoConstructor.selecciones)) {
                    if (cod === codigo) continue;
                    const horariosCandidato = horariosMaterias[codigo]?.[subgrupoKey];
                    const horariosSeleccionado = horariosMaterias[cod]?.[sel];
                    if (tienenCruce(horariosCandidato, horariosSeleccionado)) {
                        compatible = false;
                        break;
                    }
                }
                if (compatible) opciones.push(subgrupoKey);
            }
        }
        return opciones;
    }

    function calcularEstadisticas() {
        let totalCombinaciones = 1;
        let combinacionesExcedidas = false;
        for (const codigo of estadoConstructor.materias) {
            if (!estadoConstructor.selecciones[codigo]) {
                const opciones = calcularOpcionesPosibles(codigo);
                if (totalCombinaciones * opciones.length > 10000) {
                    combinacionesExcedidas = true;
                    break;
                }
                totalCombinaciones *= opciones.length;
            }
        }
        return { seleccionadas: Object.keys(estadoConstructor.selecciones).length, total: combinacionesExcedidas ? 10000 : totalCombinaciones };
    }

            <div class="instrucciones-prioridad">
                <span><span class="ejemplo-prioridad">1</span> Haga clic en cualquier tarjeta para asignarle prioridad. El orden de prioridad determina qué materia se intentará agendar primero.</span>
                <button onclick="reiniciarPrioridades()" class="boton-ordenar">↻ Reiniciar Prioridades</button>
            </div>
            <div id="sortable-container" style="display: flex; flex-wrap: wrap; gap: 20px;">
        `;
        
        estadoConstructor.materias.forEach((codigo, index) => {
            const materia = materias[codigo];
            const tieneSeleccion = !!estadoConstructor.selecciones[codigo];
            const prioridad = prioridades[codigo] || null;
            const opcionesPosibles = calcularOpcionesPosibles(codigo);
            
            // Función para obtener nombre visual de la opción
            function getNombreVisual(subgrupoKey) {
                const grupo = subgrupoKey[0];
                const numero = parseInt(subgrupoKey.substring(1));
                const numSubgrupos = materia.grupos[grupo] || 1;
                return obtenerNombreSubgrupo(grupo, numero, numSubgrupos);
            }
            
            html += `
                <div class="materia-prioridad ${tieneSeleccion ? 'seleccionada' : ''}" data-codigo="${codigo}" onclick="seleccionarPrioridad('${codigo}')" style="flex: 1; min-width: 280px; background: white; border: 2px solid ${tieneSeleccion ? '#3b82f6' : '#e2e8f0'}; padding: 15px; border-radius: 12px; transition: all 0.2s; position: relative;">
                    ${prioridad ? `<div class="numero-prioridad">${prioridad}</div>` : ''}
                    <div style="display: flex; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0;">
                        <span style="background: ${tieneSeleccion ? '#3b82f6' : '#f1f5f9'}; color: ${tieneSeleccion ? 'white' : '#64748b'}; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: bold; margin-right: 8px;">${index + 1}</span>
                        <strong style="color: #0f172a; font-size: 12px; flex: 1;">${materia ? materia.nombre : 'Materia no encontrada'}</strong>
                        <span style="background: ${tieneSeleccion ? '#3b82f620' : '#f1f5f9'}; color: ${tieneSeleccion ? '#2563eb' : '#64748b'}; padding: 2px 8px; border-radius: 12px; font-size: 10px; margin-left: 5px;">${opcionesPosibles.length} opc.</span>
                    </div>
                    <select onchange="actualizarSeleccion('${codigo}', this.value)" onclick="event.stopPropagation()" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 8px; font-size: 11px;">
                        <option value="">Seleccione grupo...</option>
            `;
            
            const opcionesOrdenadas = [...opcionesPosibles].sort();
            opcionesOrdenadas.forEach(subgrupoKey => {
                const selected = estadoConstructor.selecciones[codigo] === subgrupoKey ? 'selected' : '';
                const nombreVisual = getNombreVisual(subgrupoKey);
                const docente = textosPersonalizados[codigo]?.[subgrupoKey] || 'Docente no asignado';
                html += `<option value="${subgrupoKey}" ${selected}>${nombreVisual} - ${docente}</option>`;
            });
            
            html += `</select>`;
            if (estadoConstructor.selecciones[codigo]) {
                const docenteCompleto = textosPersonalizados[codigo]?.[estadoConstructor.selecciones[codigo]] || '';
                const docenteResumido = obtenerNombreDocenteResumido(docenteCompleto);
                const color = coloresGrupos[codigo]?.[estadoConstructor.selecciones[codigo]] || '#f8fafc';
                const nombreVisualSeleccionado = (() => {
                    const sel = estadoConstructor.selecciones[codigo];
                    const grupo = sel[0];
                    const numero = parseInt(sel.substring(1));
                    const numSubgrupos = materia.grupos[grupo] || 1;
                    return obtenerNombreSubgrupo(grupo, numero, numSubgrupos);
                })();
                html += `<div style="font-size: 10px; padding: 6px; background: ${color}; border-radius: 6px; margin-top: 5px;"><span style="color: #1e293b;">📚 ${nombreVisualSeleccionado} - ${docenteResumido || 'Docente no asignado'}</span></div>`;
            }
            html += `</div>`;
        });
        
        html += '</div>';
        contenedor.innerHTML = html;
        
        const stats = calcularEstadisticas();
        document.getElementById('contador-opciones').textContent = stats.total >= 10000 ? '+9999' : stats.total;
        const progreso = (Object.keys(estadoConstructor.selecciones).length / estadoConstructor.materias.length) * 100;
        document.getElementById('barra-progreso').style.width = `${progreso}%`;
    }

    window.seleccionarPrioridad = function(codigo) {
        if (!estadoConstructor.prioridades) estadoConstructor.prioridades = {};
        if (estadoConstructor.selecciones[codigo]) {
            alert('Primero deseleccione el grupo de esta materia para cambiar su prioridad.');
            return;
        }
        if (estadoConstructor.prioridades[codigo]) {
            delete estadoConstructor.prioridades[codigo];
            const nuevasPrioridades = {};
            let contador = 1;
            estadoConstructor.materias.forEach(mat => {
                if (estadoConstructor.prioridades[mat]) nuevasPrioridades[mat] = contador++;
            });
            estadoConstructor.prioridades = nuevasPrioridades;
        } else {
            const siguientePrioridad = Object.keys(estadoConstructor.prioridades).length + 1;
            estadoConstructor.prioridades[codigo] = siguientePrioridad;
        }
        actualizarOpcionesConstructor();
    };

    window.reiniciarPrioridades = function() {
        estadoConstructor.prioridades = {};
        actualizarOpcionesConstructor();
    };

    window.actualizarSeleccion = function(codigo, valor) {
        if (valor) estadoConstructor.selecciones[codigo] = valor;
        else delete estadoConstructor.selecciones[codigo];
        actualizarOpcionesConstructor();
    };

    window.completarAutomaticamente = function() {
        const materiasConPrioridad = [];
        const materiasSinPrioridad = [];
        estadoConstructor.materias.forEach(codigo => {
            if (estadoConstructor.prioridades[codigo]) materiasConPrioridad.push(codigo);
            else materiasSinPrioridad.push(codigo);
        });
        materiasConPrioridad.sort((a, b) => (estadoConstructor.prioridades[a] || 999) - (estadoConstructor.prioridades[b] || 999));
        const materiasOrdenadas = [...materiasConPrioridad, ...materiasSinPrioridad];
        
        function buscarCompletar(index) {
            if (index >= materiasOrdenadas.length) return true;
            const codigo = materiasOrdenadas[index];
            if (estadoConstructor.selecciones[codigo]) return buscarCompletar(index + 1);
            const opciones = calcularOpcionesPosibles(codigo);
            for (const opcion of opciones) {
                estadoConstructor.selecciones[codigo] = opcion;
                if (buscarCompletar(index + 1)) return true;
                delete estadoConstructor.selecciones[codigo];
            }
            return false;
        }
        
        if (buscarCompletar(0)) {
            actualizarOpcionesConstructor();
            verHorarioActual();
        } else {
            alert("No se puede completar el horario automáticamente. Intente seleccionar algunas materias manualmente o ajuste las prioridades.");
        }
    };

    window.reiniciarConstructor = function() {
        estadoConstructor.selecciones = {};
        estadoConstructor.prioridades = {};
        actualizarOpcionesConstructor();
    };

    window.verHorarioActual = function() {
        if (Object.keys(estadoConstructor.selecciones).length === 0) {
            alert("Seleccione al menos un grupo para ver el horario.");
            return;
        }
        mostrarPantallaHorario(estadoConstructor.materias);
        setTimeout(() => {
            for (const [codigo, subgrupoKey] of Object.entries(estadoConstructor.selecciones)) {
                const grupo = subgrupoKey[0];
                const numero = parseInt(subgrupoKey.substring(1));
                const grupoCheckbox = document.getElementById(`grupo-${codigo}-${grupo}`);
                if (grupoCheckbox) {
                    grupoCheckbox.checked = true;
                    const columna = grupoCheckbox.closest('.columna-materia');
                    if (columna) {
                        const numSubgrupos = materias[codigo]?.grupos[grupo] || 0;
                        window.mostrarSubgrupos(columna, codigo, grupo, numSubgrupos);
                        setTimeout(() => {
                            const subCheckbox = document.getElementById(`subgrupo-${codigo}-${grupo}-${numero}`);
                            if (subCheckbox) subCheckbox.checked = true;
                        }, 100);
                    }
                }
            }
        }, 500);
    };

    window.iniciarConstructorHorario = function() {
        const materiasSeleccionadas = [];
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            materiasSeleccionadas.push(cb.value);
        });
        if (materiasSeleccionadas.length === 0) {
            alert("Por favor, seleccione al menos una materia.");
            return;
        }

        document.querySelector('#contenedor-anos').style.display = 'none';
        document.querySelector('#continuar').style.display = 'none';
        document.querySelector('h2').style.display = 'none';
        
        const panelAnterior = document.getElementById('constructor-panel');
        if (panelAnterior) panelAnterior.remove();

        const panel = document.createElement('div');
        panel.id = 'constructor-panel';
        panel.innerHTML = `
            <div style="background: white; padding: 25px; border-radius: 16px; margin: 20px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin: 0; color: #0f172a; font-weight: 600;">🛠️ Constructor de Horario</h3>
                    <button onclick="cerrarConstructor()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b;">✕</button>
                </div>
                <p style="color: #475569; margin-bottom: 20px;">Haga clic en cualquier tarjeta para asignarle prioridad. El orden de prioridad determina qué materia se intentará agendar primero.</p>
                <div id="opciones-dinamicas" style="margin-bottom: 20px;"></div>
                <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 500; color: #334155;">Horarios posibles:</span>
                        <span id="contador-opciones" style="font-weight: 700; color: #2563eb; font-size: 18px;">Calculando...</span>
                    </div>
                    <div style="margin-top: 10px; height: 4px; background: #e2e8f0; border-radius: 2px;">
                        <div id="barra-progreso" style="height: 100%; background: #22c55e; border-radius: 2px; width: 0%;"></div>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button onclick="completarAutomaticamente()" style="background: linear-gradient(135deg, #22c55e, #16a34a); color: white; padding: 12px 24px; border: none; border-radius: 30px; font-weight: 500; cursor: pointer; flex: 1;">⚡ Completar Automáticamente</button>
                    <button onclick="reiniciarConstructor()" style="background: #f1f5f9; color: #334155; padding: 12px 24px; border: 1px solid #cbd5e1; border-radius: 30px; font-weight: 500; cursor: pointer;">↻ Reiniciar</button>
                    <button onclick="verHorarioActual()" style="background: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 30px; font-weight: 500; cursor: pointer;">👁️ Ver Horario</button>
                </div>
                <div style="margin-top: 15px; text-align: center; font-size: 11px; color: #94a3b8;">Las opciones se actualizan automáticamente según sus selecciones</div>
            </div>
        `;
        
        document.querySelector('#contenedor-anos').insertAdjacentElement('afterend', panel);
        
        estadoConstructor = {
            materias: materiasSeleccionadas,
            materiasOriginales: [...materiasSeleccionadas],
            selecciones: {},
            prioridades: {},
            modo: 'activo'
        };
        
        actualizarOpcionesConstructor();
    };

    window.cerrarConstructor = function() {
        document.getElementById('constructor-panel')?.remove();
        document.querySelector('#contenedor-anos').style.display = 'flex';
        document.querySelector('#continuar').style.display = 'inline-block';
        document.querySelector('h2').style.display = 'block';
    };

    // ==================== FUNCIONES DE NAVEGACIÓN ====================
    window.volverAlInicioCompleto = function() {
        document.querySelector('#contenedor-anos').style.display = 'flex';
        document.querySelector('#continuar').style.display = 'inline-block';
        document.querySelector('h2').style.display = 'block';
        document.querySelector('#contenedor-materias').style.display = 'none';
        document.querySelector('#botones-horario').style.display = 'none';
        document.querySelector('#horario').style.display = 'none';
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        document.querySelectorAll('[id^="subgrupos-"]').forEach(container => {
            container.innerHTML = '';
            container.style.display = 'none';
        });
        const tablaHorario = document.getElementById('horario');
        if (tablaHorario) tablaHorario.innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.volverAlMenu = function() {
        volverAlInicioCompleto();
    };

    // ==================== EXPORTAR A EXCEL ====================
    window.exportarAExcel = function() {
        const tabla = document.getElementById('horario');
        if (!tabla || tabla.innerHTML.trim() === '') {
            alert('No hay horario generado para exportar.');
            return;
        }
        
        try {
            const tablaClone = tabla.cloneNode(true);
            const filas = tablaClone.querySelectorAll('tr');
            filas.forEach(fila => {
                const celdas = fila.querySelectorAll('td');
                celdas.forEach(celda => {
                    const originalCelda = Array.from(document.querySelectorAll('#horario td')).find(
                        td => td.textContent === celda.textContent && td.parentElement.rowIndex === fila.rowIndex
                    );
                    if (originalCelda) {
                        const bgColor = window.getComputedStyle(originalCelda).backgroundColor;
                        if (bgColor && bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent') {
                            celda.style.backgroundColor = bgColor;
                        }
                        const color = window.getComputedStyle(originalCelda).color;
                        if (color && color !== 'rgb(0, 0, 0)') {
                            celda.style.color = color;
                        }
                    }
                });
            });
            
            const materiasInfo = [];
            document.querySelectorAll('#contenedor-materias .columna-materia').forEach(columna => {
                const nombreMateria = columna.querySelector('h2')?.textContent || '';
                const gruposSeleccionados = [];
                columna.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                    if (cb.id.includes('subgrupo-')) {
                        const valor = cb.value;
                        gruposSeleccionados.push(valor);
                    }
                });
                if (gruposSeleccionados.length > 0) {
                    materiasInfo.push(`${nombreMateria} (Grupos: ${gruposSeleccionados.join(', ')})`);
                }
            });
            
            const fecha = new Date().toLocaleString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const fechaArchivo = new Date().toISOString().split('T')[0];
            const horaArchivo = new Date().toLocaleTimeString('es-ES').replace(/:/g, '-');
            const nombreArchivo = `Horario_Medicina_${fechaArchivo}_${horaArchivo}.xls`;
            
            const contenidoHTML = `
                <html>
                    <head><meta charset="UTF-8"><title>Horario de Medicina - U.A.G.R.M.</title>
                    <style>
                        body { font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; margin: 20px; }
                        .header { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 20px; border-radius: 10px 10px 0 0; }
                        h1 { margin: 0; font-size: 24px; }
                        .subheader { background: #f8fafc; padding: 15px 20px; border: 1px solid #e2e8f0; border-top: none; margin-bottom: 20px; }
                        table { border-collapse: collapse; width: 100%; background: white; }
                        th { background: #f1f5f9; color: #0f172a; padding: 12px 8px; border: 1px solid #cbd5e1; }
                        td { border: 1px solid #cbd5e1; padding: 8px 4px; vertical-align: top; font-size: 11px; }
                        .footer { margin-top: 30px; color: #64748b; font-size: 10px; text-align: center; }
                    </style>
                    </head>
                    <body>
                        <div class="header"><h1>🏥 HORARIO MEDICINA GESTIÓN 2026</h1></div>
                        <div class="subheader">
                            <div><strong>📅 Fecha de generación:</strong> ${fecha}</div>
                            ${materiasInfo.length > 0 ? `<div><strong>📖 Materias seleccionadas:</strong><br><ul>${materiasInfo.map(m => `<li>${m}</li>`).join('')}</ul></div>` : ''}
                        </div>
                        ${tablaClone.outerHTML}
                        <div class="footer"><p>Desarrollado por Erik León - 2026 | Los horarios están sujetos a cambios según disposición de la facultad</p></div>
                    </body>
                </html>
            `;
            
            const blob = new Blob([contenidoHTML], { type: 'application/vnd.ms-excel' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nombreArchivo;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        } catch (error) {
            console.error('Error:', error);
            alert('Hubo un error al exportar. Por favor, intente nuevamente.');
        }
    };
})();
</script>
</body>
</html>
